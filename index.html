<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <h1>Client Dashboard</h1>
      <div class="profile-section">
        <span>Hi, John!</span>
        <button class="profile-icon" id="profileIcon">👤</button>
        <div class="dropdown" id="profileDropdown">
          <h3>Saved Projects</h3>
          <div class="saved-projects">
            <div class="saved-card">
              <h4>Cybersecurity Management</h4>
              <div class="tag-list">
                <span class="tag tag--purple">Cybersecurity</span>
                <span class="tag tag--teal">Data Centers</span>
                <span class="tag tag--blue">San Jose</span>
              </div>
            </div>
            <div class="saved-card">
              <h4>Cloud Migration Assessment</h4>
              <div class="tag-list">
                <span class="tag tag--purple">Cloud</span>
                <span class="tag tag--teal">Compliance</span>
                <span class="tag tag--blue">Los Angeles</span>
              </div>
            </div>
            <div class="saved-card">
              <h4>Facility Security Upgrade</h4>
              <div class="tag-list">
                <span class="tag tag--purple">Facilities</span>
                <span class="tag tag--teal">Security</span>
                <span class="tag tag--blue">Sacramento</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="main-grid">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2>Recommended RFPs</h2>
        </div>
        <div class="rfp-list" id="rfpList"></div>
      </aside>

      <section class="detail-panel">
        <div class="detail-card" id="detailCard">
          <p class="detail-empty">Select a recommended RFP to see more details.</p>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
